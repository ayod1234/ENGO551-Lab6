<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ayooluwa - Geoweb App</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #map { height: 600px; width: 100%; border-radius: 8px; z-index: 1; }
        .controls { background: #212529; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        footer { color: #aaa; }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
</head>
<body class="bg-dark text-white">

    <main class="container mt-4">
        <header class="mb-4">
            <h2 style="text-align: center;">Lab 6: Line Simplification Tool</h2>
            <p class="text-info" style="text-align: center;">Draw a polyline using the toolbar, then simplify it using Turf.js.</p>
        </header>

        <div class="controls border border-secondary">
            <button id="simplifyBtn" class="btn btn-primary me-2">Simplify Polyline</button>
            <button id="clearBtn" class="btn btn-outline-danger">Clear Map</button>
            <span id="stats" class="ms-3 text-warning"></span>
        </div>

        <div id="map" class="shadow-lg"></div>
    </main>

    <footer class="container mt-5 pt-3 border-top">
        <p style = "text-align: center;">Author: Ayooluwa Durojaiye</p>
        <p style= "text-align: center;">Email: <a href="mailto:duroayo17@gmail.com" class="text-info">duroayo17@gmail.com</a></p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script>
        let map;
        let drawnItems;
        let simplifiedLayer;

        function initMap() {
            // Initialize Map focused on Calgary
            map = L.map('map').setView([51.0447, -114.0719], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Layer to hold the user's drawing
            drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            // Configure Draw Toolbar
            const drawControl = new L.Control.Draw({
                draw: {
                    polyline: { shapeOptions: { color: '#3388ff', weight: 4 } },
                    polygon: false,
                    circle: false,
                    marker: false,
                    circlemarker: false,
                    rectangle: false
                },
                edit: { featureGroup: drawnItems }
            });
            map.addControl(drawControl);

            // Event: Polyline created
            map.on(L.Draw.Event.CREATED, function (e) {
                // Clear existing drawings to allow a fresh start
                clearLayers();
                drawnItems.addLayer(e.layer);
            });
        }

        function clearLayers() {
            drawnItems.clearLayers();
            if (simplifiedLayer) map.removeLayer(simplifiedLayer);
            document.getElementById('stats').innerText = "";
        }

        // Simplify Action
        document.getElementById('simplifyBtn').addEventListener('click', () => {
            const layers = drawnItems.getLayers();
            if (layers.length === 0) {
                alert("Please draw a line on the map first!");
                return;
            }

            const originalLayer = layers[0];
            const geojson = originalLayer.toGeoJSON();

            // Turf Simplify Logic
            // tolerance: Higher = fewer points. 0.01 is a good middle ground for cities.
            const options = { tolerance: 0.01, highQuality: true };
            const simplified = turf.simplify(geojson, options);

            // Remove old analysis layer
            if (simplifiedLayer) map.removeLayer(simplifiedLayer);

            // Add simplified line to map (Red/Dashed)
            simplifiedLayer = L.geoJSON(simplified, {
                style: { color: '#ff4b2b', weight: 5, dashArray: '10, 10' }
            }).addTo(map);

            // Update stats
            const originalCount = geojson.geometry.coordinates.length;
            const simplifiedCount = simplified.geometry.coordinates.length;
            document.getElementById('stats').innerText = 
                `Points: ${originalCount} → Simplified: ${simplifiedCount}`;
        });

        // Clear Button
        document.getElementById('clearBtn').addEventListener('click', clearLayers);

        // Run on load
        window.onload = initMap;
    </script>
    </body>
</html>
